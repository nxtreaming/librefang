id = "apitester"
version = "1.1.0"
name = "API Tester Hand"
description = "Autonomous API testing agent — endpoint discovery, request validation, load testing, and regression detection"

category = "development"
icon = "lucide:plug"

tools = [
  "shell_exec",
  "file_read",
  "file_write",
  "file_list",
  "web_fetch",
  "web_search",
  "memory_store",
  "memory_recall",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "event_publish",
]

# Per-hand resource allowlists (refs librefang/librefang-registry#87).
# Inherited by every [agents.*] in this hand unless overridden.
mcp_servers = ["memory", "github", "fetch"]
skills = [
  "api-tester",
  "openapi-expert",
  "graphql-expert",
  "python-expert",
  "typescript-expert",
]


[[requires]]
key = "curl"
label = "curl must be installed"
requirement_type = "binary"
check_value = "curl"
description = "curl is used to send HTTP requests to target API endpoints for testing, validation, and load simulation."

[requires.install]
macos = "brew install curl"
linux_apt = "sudo apt install curl"
linux_dnf = "sudo dnf install curl"
linux_pacman = "sudo pacman -S curl"
windows = "winget install cURL.cURL"
estimated_time = "1 min"

[routing]
aliases = [
  "api test",
  "endpoint test",
  "load test",
  "regression test",
  "api discovery",
  "test api",
  "api testing",
  "api validation",
  "test endpoint",
]
weak_aliases = [
  "api debug",
  "request validation",
  "swagger",
  "openapi",
  "postman",
  "stress test",
  "http test",
]

