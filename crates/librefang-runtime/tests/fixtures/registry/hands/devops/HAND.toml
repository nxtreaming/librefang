  "docker",
  "kubernetes",
  "terraform",
  "ansible",
  "ci-cd",
  "helm",
  "prometheus",
  "sysadmin",
  "linux-networking",
  "shell-scripting",
]


[[requires]]
key = "curl"
label = "curl must be installed"
requirement_type = "binary"
check_value = "curl"
description = "curl is used for HTTP health checks, GitHub API calls, and service endpoint monitoring."

[requires.install]
macos = "brew install curl"
linux_apt = "sudo apt install curl"
linux_dnf = "sudo dnf install curl"
linux_pacman = "sudo pacman -S curl"
windows = "winget install cURL.cURL"
estimated_time = "1 min"

[[requires]]
key = "git"
label = "git must be installed"
requirement_type = "binary"
check_value = "git"
description = "git is used for deployment history, version control operations, and CI/CD pipeline management."

[requires.install]
macos = "brew install git"
linux_apt = "sudo apt install git"
linux_dnf = "sudo dnf install git"
linux_pacman = "sudo pacman -S git"
windows = "winget install Git.Git"
estimated_time = "1-2 min"

[[requires]]
key = "docker"
label = "Docker (optional — needed for container workloads)"
requirement_type = "binary"
