linux_apt = "sudo apt install docker.io"
linux_dnf = "sudo dnf install docker"
linux_pacman = "sudo pacman -S docker"
windows = "winget install Docker.DockerDesktop"
manual_url = "https://docs.docker.com/get-docker/"
estimated_time = "5-10 min"

[[requires]]
key = "GITHUB_TOKEN"
label = "GitHub Token (optional — needed for GitHub Actions)"
requirement_type = "api_key"
check_value = "GITHUB_TOKEN"
optional = true
description = "A GitHub personal access token for accessing GitHub Actions API, checking pipeline status, and triggering workflows."

[requires.install]
signup_url = "https://github.com/settings/tokens"
docs_url = "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
env_example = "GITHUB_TOKEN=ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
estimated_time = "2-5 min"
