id = "browser"
version = "1.1.0"
name = "Browser Hand"
description = "Autonomous web browser — navigates sites, fills forms, clicks buttons, and completes multi-step web tasks with user approval for purchases"

category = "productivity"
tags = ["popular"]
icon = "lucide:globe"

tools = [
  "browser_navigate",
  "browser_click",
  "browser_type",
  "browser_screenshot",
  "browser_read_page",
  "browser_close",
  "web_search",
  "web_fetch",
  "memory_store",
  "memory_recall",
  "knowledge_add_entity",
  "knowledge_add_relation",
  "knowledge_query",
  "schedule_create",
  "schedule_list",
  "schedule_delete",
  "file_write",
  "file_read",
]

# Per-hand resource allowlists (refs librefang/librefang-registry#87).
# Inherited by every [agents.*] in this hand unless overridden.
mcp_servers = ["memory", "puppeteer"]
skills = []


[routing]
aliases = [
  "open website",
  "navigate to",
  "fill form",
  "click button",
  "web login",
  "browser automation",
  "browse web",
  "scrape page",
]
weak_aliases = [
  "web page",
  "submit form",
  "web task",
  "browser task",
  "open browser",
  "web automation",
]

[[requires]]
key = "python3"
label = "Python 3 must be installed"
requirement_type = "binary"
check_value = "python3"
description = "Python 3 is required for installing and running the Playwright browser automation library. Python 3.8 or newer is recommended."

[requires.install]
macos = "brew install python3"
windows = "winget install Python.Python.3.12"
linux_apt = "sudo apt install python3"
linux_dnf = "sudo dnf install python3"
linux_pacman = "sudo pacman -S python"
manual_url = "https://www.python.org/downloads/"
estimated_time = "1-3 min"

[[requires]]
key = "chromium"
label = "Chromium or Google Chrome must be installed"
requirement_type = "binary"
check_value = "chromium"
optional = true
description = "A Chromium-based browser is recommended. Playwright can install its own bundled browser if none is found. Google Chrome, Chromium, or any Chromium derivative will also work. You can set the CHROME_PATH environment variable to point to your browser binary."

[requires.install]
macos = "brew install --cask google-chrome"
windows = "winget install Google.Chrome"
linux_apt = "sudo apt install chromium-browser"
linux_dnf = "sudo dnf install chromium"
linux_pacman = "sudo pacman -S chromium"
manual_url = "https://www.google.com/chrome/"
estimated_time = "1-3 min"

