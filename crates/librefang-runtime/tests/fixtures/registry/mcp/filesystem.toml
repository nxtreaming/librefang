id = "filesystem"
name = "Filesystem"
description = "Read, write, search, and manage local files through the official MCP filesystem server"
category = "devtools"
icon = "📁"
tags = ["files", "local", "read", "write", "search"]

[transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem@latest", "$HOME"]

[health_check]
interval_secs = 60
unhealthy_threshold = 3

setup_instructions = """
Exposes your home directory to agents by default.

To restrict access to specific directories, add a custom entry in config.toml:

```toml
[[mcp_servers]]
name = "filesystem"

[mcp_servers.transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem@latest", "/path/to/expose"]
```

Requires Node.js / npx.
"""


