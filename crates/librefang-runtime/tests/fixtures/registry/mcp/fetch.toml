id = "fetch"
name = "Web Fetch"
description = "Fetch any web URL and receive its content as clean Markdown — ideal for reading docs, articles, and APIs"
category = "devtools"
icon = "🌐"
tags = ["web", "fetch", "scraping", "markdown", "http"]

[transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-fetch@latest"]

[health_check]
interval_secs = 60
unhealthy_threshold = 3

setup_instructions = """
No API key required. Fetches any publicly accessible URL and returns the content as Markdown.

For JavaScript-rendered pages (SPAs), use the Puppeteer integration instead.
"""


