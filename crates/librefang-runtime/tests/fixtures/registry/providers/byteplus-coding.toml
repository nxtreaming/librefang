# BytePlus ModelArk — Coding Plan (Anthropic-compatible) — https://www.byteplus.com/en/product/ModelArk
# International edition's Claude Code-compatible endpoint with friendly model aliases.
# Models: 9 (auto-routed alias + 8 named models)
#
# 💡 BILLING — calls here count against your **Coding Plan
# subscription quota**, not your per-token ModelArk USD balance. If you
# don't have a Coding Plan or want per-token billing instead, use the
# `byteplus` provider in byteplus.toml. The Coding Plan endpoint also
# does not expose image / video / embedding models — only the text
# models listed below.
#
# Pricing fields below mirror the underlying versioned snapshots in
# byteplus.toml for catalog accounting purposes; actual subscription
# consumption is tracked by the BytePlus console, not these numbers.
#
# The Coding Plan endpoint exposes friendly stable names that route to
# the current production snapshot, so versions advance silently without
# config changes (use `ark-code-latest` to always get the best current
# routing).

[provider]
id = "byteplus_coding"
display_name = "BytePlus Coding Plan"
api_key_env = "BYTEPLUS_CODING_API_KEY"
base_url = "https://ark.ap-southeast.bytepluses.com/api/coding"
key_required = true

[[models]]
id = "ark-code-latest"
display_name = "Ark Code (auto-routed)"
tier = "frontier"
context_window = 196608
max_output_tokens = 8192
input_cost_per_m = 1.00
output_cost_per_m = 6.00
supports_tools = true
supports_streaming = true
aliases = ["ark-coding"]

[[models]]
