# MiniMax — https://minimax.io
# Models: 14 (4 text + 1 image + 4 audio TTS + 3 video + 2 music)
# Regions: international (default), china (minimaxi.com)
#
# Non-text models are billed per call rather than per token, so
# input_cost_per_m / output_cost_per_m are set to 0.0 and the actual
# rate is documented in the inline comment above each entry.
# Source: https://platform.minimax.io/docs/guides/pricing-paygo

[provider]
id = "minimax"
display_name = "MiniMax"
api_key_env = "MINIMAX_API_KEY"
base_url = "https://api.minimax.io/v1"
key_required = true
media_capabilities = [
  "image_generation",
  "text_to_speech",
  "video_generation",
  "music_generation",
]

[provider.regions.china]
base_url = "https://api.minimaxi.com/v1"
api_key_env = "MINIMAX_CN_API_KEY"

[[models]]
id = "MiniMax-M2.7"
display_name = "MiniMax M2.7"
tier = "frontier"
context_window = 204800
max_output_tokens = 131072
input_cost_per_m = 0.30
output_cost_per_m = 1.20
supports_tools = true
supports_vision = false
supports_streaming = true
aliases = ["minimax-m2.7"]

[[models]]
id = "MiniMax-M2.7-highspeed"
display_name = "MiniMax M2.7 Highspeed"
tier = "smart"
context_window = 204800
max_output_tokens = 131072
input_cost_per_m = 0.30
output_cost_per_m = 1.20
supports_tools = true
supports_vision = false
supports_streaming = true
aliases = ["minimax-m2.7-highspeed", "m2.7-highspeed"]

[[models]]
id = "MiniMax-M2.5"
display_name = "MiniMax M2.5"
tier = "frontier"
