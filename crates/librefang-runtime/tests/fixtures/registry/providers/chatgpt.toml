# ChatGPT (Session Auth / Codex Responses API) — https://chatgpt.com
# Models: 6 (free with ChatGPT subscription via OAuth session)

[provider]
id = "chatgpt"
display_name = "ChatGPT (Session Auth)"
api_key_env = "CHATGPT_SESSION_TOKEN"
base_url = "https://chatgpt.com/backend-api"
key_required = true

[[models]]
id = "gpt-5.5-codex"
display_name = "GPT-5.5 Codex"
tier = "frontier"
# Per OpenAI's GPT-5.5 announcement, Codex exposes a 400K context window
# for subscription plans (announcement 2026-04-23).
context_window = 400000
max_output_tokens = 65536
input_cost_per_m = 0.0
output_cost_per_m = 0.0
supports_tools = true
supports_vision = false
supports_streaming = true
aliases = ["chatgpt-5.5"]

