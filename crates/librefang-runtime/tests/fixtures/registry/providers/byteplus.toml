# BytePlus ModelArk — https://www.byteplus.com/en/product/ModelArk
# International edition of Volcano Engine (VolcEngine).
# Models: 11 (6 text + 2 image + 3 video)
#
# ⚠️  BILLING — READ BEFORE USE
# This provider points at the **standard** ModelArk inference endpoint
# (`/api/v3`). Calls here are billed **per-token / per-call against your
# ModelArk USD balance**. They DO NOT consume your Coding Plan
# subscription quota.
#
# If you have a Coding Plan subscription and want calls to count against
# it, use `byteplus_coding` (Anthropic protocol, friendly model
# aliases) — see byteplus-coding.toml. The official BytePlus docs
# explicitly warn against using `/api/v3` for Coding Plan workloads:
#   https://docs.byteplus.com/en/docs/ModelArk/1928261
#
# Use this `byteplus` provider when you want:
#   - Image generation (Seedream 4.5, Seedream 5.0 Lite)
#   - Video generation (Seedance 1.5 Pro, Dreamina Seedance 2.0 / 2.0 Fast)
#   - Versioned text-model snapshots (e.g. `seed-2-0-pro-260328`)
#   …none of which exist on the Coding Plan endpoint.
#
# Pricing below is the standard real-time tier (a discounted batch tier
# exists at ~half the rate; image/video billed per-call or per-token in
# their own units, see comments above each model).

[provider]
id = "byteplus"
display_name = "BytePlus ModelArk"
api_key_env = "BYTEPLUS_API_KEY"
base_url = "https://ark.ap-southeast.bytepluses.com/api/v3"
key_required = true
media_capabilities = ["image_generation", "video_generation"]

# ── Text models ────────────────────────────────────────────────────────

[[models]]
id = "seed-2-0-pro-260328"
display_name = "Seed 2.0 Pro"
tier = "frontier"
context_window = 262144
max_output_tokens = 16384
input_cost_per_m = 1.00
output_cost_per_m = 6.00
supports_tools = true
supports_vision = true
supports_streaming = true
supports_thinking = true
aliases = ["seed-pro", "seed-2-pro"]

