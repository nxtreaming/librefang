[provider]
id = "codex-cli"
display_name = "Codex CLI"
api_key_env = ""
base_url = ""
key_required = false

# Models track the currently-visible ("visibility": "list") slugs in
# upstream openai/codex's codex-rs/models-manager/models.json. Hidden
# slugs (gpt-5, gpt-5-codex, gpt-5.1, gpt-5.1-codex, gpt-5-codex-mini,
# gpt-oss-*) are intentionally omitted because the Codex CLI actively
# migrates users off them via tui/src/model_migration.rs.

[[models]]
id = "codex-cli/gpt-5.5"
display_name = "GPT-5.5 (Codex CLI)"
provider = "codex-cli"
tier = "frontier"
# Per OpenAI's GPT-5.5 announcement, Codex exposes a 400K context window
# (announcement 2026-04-23).
context_window = 400000
max_output_tokens = 128000
input_cost_per_m = 0.0
output_cost_per_m = 0.0
supports_tools = true
supports_vision = true
supports_streaming = true
supports_thinking = true
aliases = ["codex-cli-gpt-5.5"]

